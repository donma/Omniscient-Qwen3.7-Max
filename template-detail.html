<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>樣板詳情 — 全職設計視角</title>
  <meta name="description" content="查看樣板詳細資訊，包含版型、產業分類、頁面清單與 SEO 結構說明。">
  <link rel="canonical" href="">
  <meta property="og:title" content="樣板詳情 — 全職設計視角">
  <meta property="og:description" content="完整網站樣板詳情資訊。">
  <meta property="og:image" content="assets/img/previews/og-cover.jpg">
  <meta property="og:type" content="website">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/gallery.css">
</head>
<body class="detail-page">

  <!-- Header -->
  <header class="gallery-header" id="galleryHeader">
    <div class="container-fluid px-4">
      <nav class="gallery-nav">
        <a href="index.html" class="gallery-brand">
          <span class="brand-icon"><i class="bi bi-grid-3x3-gap-fill"></i></span>
          <span class="brand-text">全職設計視角</span>
        </a>
        <ul class="gallery-menu d-none d-lg-flex">
          <li><a href="index.html">首頁</a></li>
          <li><a href="index.html#templates-section">瀏覽樣板</a></li>
          <li><a href="index.html#about-section">使用說明</a></li>
          <li><a href="index.html#about-section">關於我們</a></li>
        </ul>
        <button class="gallery-hamburger d-lg-none" id="hamburgerBtn" aria-label="開啟選單">
          <span></span><span></span><span></span>
        </button>
      </nav>
    </div>
    <div class="mobile-drawer" id="mobileDrawer">
      <ul>
        <li><a href="index.html">首頁</a></li>
        <li><a href="index.html#templates-section">瀏覽樣板</a></li>
        <li><a href="index.html#about-section">使用說明</a></li>
        <li><a href="index.html#about-section">關於我們</a></li>
      </ul>
    </div>
  </header>

  <!-- Detail Content -->
  <main class="detail-main" id="detailMain">
    <!-- Loading State -->
    <div class="detail-loading" id="detailLoading">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">載入中...</span>
      </div>
      <p>載入樣板資訊...</p>
    </div>

    <!-- Error State -->
    <div class="detail-error d-none" id="detailError">
      <i class="bi bi-exclamation-triangle"></i>
      <h2>找不到樣板</h2>
      <p>請確認 URL 參數是否正確，或回到樣板列表重新選擇。</p>
      <a href="index.html" class="btn btn-primary">返回樣板列表</a>
    </div>

    <!-- Detail Content (rendered by JS) -->
    <div class="detail-content d-none" id="detailContent"></div>
  </main>

  <!-- Footer -->
  <footer class="gallery-footer">
    <div class="container">
      <div class="footer-bottom text-center">
        <p>&copy; 2026 全職設計視角。AI-assisted static website template gallery。</p>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/gallery.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      const templateId = params.get('id');
      const loading = document.getElementById('detailLoading');
      const errorEl = document.getElementById('detailError');
      const content = document.getElementById('detailContent');

      function render() {
        const data = (typeof TEMPLATES_DATA !== 'undefined') ? TEMPLATES_DATA : [];
        const tpl = data.find(function(t) { return t.id === templateId; });

        if (!tpl) {
          loading.classList.add('d-none');
          errorEl.classList.remove('d-none');
          return;
        }

        loading.classList.add('d-none');
        content.classList.remove('d-none');

        const tags = getTemplateTags(tpl);
        const bgLabel = tpl.backgroundMode === 'dark' ? '深色底' : '淺色底';
        const pages = [
          'index.html — 首頁',
          'about.html — 關於我們',
          'services.html — 服務項目',
          'service-detail.html — 服務詳情',
          'portfolio.html — 作品案例',
          'reviews.html — 客戶評價',
          'faq.html — 常見問題',
          'booking.html — 預約表單',
          'process.html — 服務流程',
          'blog.html — 文章列表',
          'blog-detail.html — 文章詳情',
          'contact.html — 聯絡我們'
        ];

        content.innerHTML = `
          <section class="detail-hero" style="background-image:url('${tpl.previewImage}')">
            <div class="detail-hero-overlay"></div>
            <div class="container position-relative" style="z-index:2">
              <a href="index.html" class="detail-back"><i class="bi bi-arrow-left"></i> 返回樣板列表</a>
              <h1 class="detail-title">${tpl.name}</h1>
              <p class="detail-desc">${tpl.description}</p>
              <div class="detail-actions">
                <a href="${tpl.demoUrl}" target="_blank" class="btn btn-primary btn-lg"><i class="bi bi-eye"></i> 預覽網站</a>
                <a href="${tpl.promptUrl}" target="_blank" class="btn btn-outline-light btn-lg"><i class="bi bi-file-earmark-text"></i> 查看 Prompt</a>
                <button class="btn btn-outline-secondary btn-lg" disabled><i class="bi bi-file-zip"></i> ZIP 待打包</button>
              </div>
            </div>
          </section>

          <section class="detail-info">
            <div class="container">
              <div class="row g-4">
                <div class="col-lg-8">
                  <div class="detail-card">
                    <h2><i class="bi bi-info-circle"></i> 樣板資訊</h2>
                    <div class="info-grid">
                      <div class="info-item"><span class="info-label">樣板編號</span><span class="info-value">${tpl.id}</span></div>
                      <div class="info-item"><span class="info-label">產業分類</span><span class="info-value">${tpl.industryCategory}</span></div>
                      <div class="info-item"><span class="info-label">產業</span><span class="info-value">${tpl.industry}</span></div>
                      <div class="info-item"><span class="info-label">色系</span><span class="info-value">${tpl.colorTheme}</span></div>
                      <div class="info-item"><span class="info-label">背景模式</span><span class="info-value">${bgLabel}</span></div>
                      <div class="info-item"><span class="info-label">版型類型</span><span class="info-value">${tpl.layoutType}</span></div>
                      <div class="info-item"><span class="info-label">頁面數量</span><span class="info-value">${tpl.pageCount} 頁</span></div>
                      <div class="info-item"><span class="info-label">圖片豐富</span><span class="info-value">${tpl.imageRich ? '是' : '否'}</span></div>
                    </div>
                  </div>

                  <div class="detail-card mt-4">
                    <h2><i class="bi bi-tags"></i> 功能標籤</h2>
                    <div class="detail-tags">
                      ${tags.map(function(tag) { return '<span class="detail-tag">' + tag + '</span>'; }).join('')}
                    </div>
                  </div>

                  <div class="detail-card mt-4">
                    <h2><i class="bi bi-file-earmark"></i> 12 頁頁面清單</h2>
                    <div class="pages-list">
                      ${pages.map(function(p, i) { return '<div class="page-item"><span class="page-num">' + String(i+1).padStart(2,'0') + '</span><span class="page-name">' + p + '</span></div>'; }).join('')}
                    </div>
                  </div>
                </div>

                <div class="col-lg-4">
                  <div class="detail-card">
                    <h2><i class="bi bi-code-slash"></i> 技術規格</h2>
                    <ul class="spec-list">
                      <li><strong>Hero Pattern:</strong> ${tpl.heroPattern}</li>
                      <li><strong>Navigation:</strong> ${tpl.navigationPattern}</li>
                      <li><strong>Content Rhythm:</strong> ${tpl.contentRhythm}</li>
                    </ul>
                  </div>

                  <div class="detail-card mt-4">
                    <h2><i class="bi bi-image"></i> 圖片來源注意事項</h2>
                    <p class="text-muted">本樣板圖片僅作為設計示意。正式交付客戶前，請替換為客戶自有圖片或已授權圖片。詳細來源紀錄請參閱樣板資料夾中的 <code>assets/img/image-sources.md</code>。</p>
                  </div>

                  <div class="detail-card mt-4">
                    <h2><i class="bi bi-search"></i> SEO 結構說明</h2>
                    <ul class="spec-list">
                      <li>每頁包含 title、meta description</li>
                      <li>Open Graph 標籤完整</li>
                      <li>語意化 HTML5 結構</li>
                      <li>Schema 結構化資料 placeholder</li>
                      <li>圖片 alt 屬性</li>
                    </ul>
                  </div>
                </div>
              </div>
            </div>
          </section>
        `;
      }

      render();

      // Mobile menu
      const hamburger = document.getElementById('hamburgerBtn');
      const drawer = document.getElementById('mobileDrawer');
      if (hamburger && drawer) {
        hamburger.addEventListener('click', function() {
          drawer.classList.toggle('open');
          hamburger.classList.toggle('active');
        });
      }
    });
  </script>
</body>
</html>
